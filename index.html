<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Ateneo de Davao University Fitness and Wellness Center — facility information and machine QR guides." />
  <title>Fitness & Wellness Center · Ateneo de Davao University</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ateneo: { DEFAULT: '#003A6C', deep: '#002845', ink: '#001a2e' },
          },
          fontFamily: {
            sans: ['"Source Sans 3"', 'system-ui', 'sans-serif'],
            display: ['"Montserrat"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    .hero-panel {
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .text-hero-shadow {
      text-shadow:
        0 0 2px rgba(0, 20, 40, 0.9),
        0 1px 0 rgba(0, 20, 40, 0.5),
        0 2px 16px rgba(0, 0, 0, 0.55),
        0 4px 32px rgba(0, 0, 0, 0.4);
    }
    .text-hero-shadow-sm {
      text-shadow:
        0 0 1px rgba(0, 20, 40, 0.85),
        0 1px 10px rgba(0, 0, 0, 0.45);
    }
  </style>
</head>
<body class="min-h-screen bg-[#003A6C] font-sans text-white antialiased">
  <header class="fixed left-0 right-0 top-0 z-50 border-b border-white/25 bg-[#003A6C] shadow-[0_4px_24px_rgba(0,0,0,0.15)]">
    <div class="relative mx-auto max-w-7xl px-5 py-3 lg:px-8">
      <div class="flex justify-end md:hidden">
        <button
          type="button"
          id="nav-burger"
          class="flex h-11 w-11 shrink-0 items-center justify-center rounded-md border border-white/20 bg-white/5 text-white transition hover:bg-white/10"
          aria-expanded="false"
          aria-controls="mobile-nav-overlay"
          aria-label="Open menu"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
      </div>
      <div class="hidden md:block">
        <div class="mx-auto grid max-w-3xl grid-cols-3 items-center gap-6 py-1 lg:max-w-4xl lg:gap-8">
          <nav class="flex flex-wrap items-center justify-start gap-x-8 gap-y-2" aria-label="Primary">
            <a href="about.html" class="font-display border-b-2 border-transparent pb-1 text-xs font-medium uppercase tracking-[0.2em] text-white transition-colors hover:border-white/60 hover:text-white">About</a>
            <a href="coaches.html" class="font-display border-b-2 border-transparent pb-1 text-xs font-medium uppercase tracking-[0.2em] text-white transition-colors hover:border-white/60 hover:text-white">Coaches</a>
          </nav>
          <div class="flex justify-center">
            <a href="./index.html" class="font-display border-b-2 border-white pb-1 text-xs font-bold uppercase tracking-[0.24em] text-white" aria-current="page">Home</a>
          </div>
          <nav class="flex flex-wrap items-center justify-end gap-x-8 gap-y-2" aria-label="Primary">
            <a href="rates.html" class="font-display border-b-2 border-transparent pb-1 text-xs font-medium uppercase tracking-[0.2em] text-white transition-colors hover:border-white/60 hover:text-white">Rates</a>
            <a href="equipment.html" class="font-display border-b-2 border-transparent pb-1 text-xs font-medium uppercase tracking-[0.2em] text-white transition-colors hover:border-white/60 hover:text-white">Equipment</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <div id="mobile-nav-overlay" class="fixed inset-0 z-[100] hidden md:hidden" aria-hidden="true">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" data-close-menu tabindex="-1"></div>
    <div class="absolute right-0 top-0 flex h-full w-[min(100%,360px)] flex-col border-l border-white/10 bg-[#002845]/98 shadow-2xl backdrop-blur-lg">
      <div class="flex items-center justify-between gap-3 border-b border-white/10 px-5 py-4">
        <div class="flex items-center gap-3">
          <img src="assets/213.png" alt="" width="80" height="80" class="h-10 w-10 shrink-0 object-contain opacity-95" decoding="async" />
          <span class="font-display text-[10px] font-semibold uppercase tracking-[0.35em] text-white/90">Menu</span>
        </div>
        <button type="button" class="flex h-10 w-10 shrink-0 items-center justify-center rounded-md border border-white/15 text-white hover:bg-white/10" data-close-menu aria-label="Close menu">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="flex flex-1 flex-col gap-1 p-5" aria-label="Mobile primary">
        <a href="./index.html" class="font-display border-l-2 border-white bg-white/10 px-4 py-3.5 text-sm font-bold uppercase tracking-[0.22em] text-white" aria-current="page">Home</a>
        <a href="about.html" class="font-display border-l-2 border-transparent px-4 py-3.5 text-sm font-semibold uppercase tracking-[0.18em] text-white transition hover:border-white/40 hover:bg-white/10">About</a>
        <a href="coaches.html" class="font-display border-l-2 border-transparent px-4 py-3.5 text-sm font-semibold uppercase tracking-[0.18em] text-white transition hover:border-white/40 hover:bg-white/10">Coaches</a>
        <a href="rates.html" class="font-display border-l-2 border-transparent px-4 py-3.5 text-sm font-semibold uppercase tracking-[0.18em] text-white transition hover:border-white/40 hover:bg-white/10">Rates</a>
        <a href="equipment.html" class="font-display border-l-2 border-transparent px-4 py-3.5 text-sm font-semibold uppercase tracking-[0.18em] text-white transition hover:border-white/40 hover:bg-white/10">Equipment</a>
      </nav>
    </div>
  </div>

  <main id="main">
    <section class="relative isolate min-h-[100dvh] overflow-hidden bg-[#003A6C]" aria-labelledby="hero-heading">
      <div class="pointer-events-none absolute inset-0">
        <img
          src="assets/qweqweq.jpg"
          alt="Fitness and Wellness Center — spacious strength floor with rubber tiles, LED lighting, and modern equipment."
          width="1920"
          height="1080"
          fetchpriority="high"
          decoding="async"
          class="h-full min-h-[100dvh] w-full object-cover object-[62%_44%] sm:object-[58%_42%] md:object-[56%_40%] lg:object-[54%_38%]"
        />
        <div class="absolute inset-0 bg-gradient-to-r from-[#001a2e]/92 from-[5%] via-[#003A6C]/55 via-[48%] to-transparent"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-[#001a2e]/55 via-transparent to-[#001a2e]/25"></div>
      </div>

      <div class="relative z-10 mx-auto flex min-h-[100dvh] w-full max-w-7xl flex-col items-center justify-center px-5 py-28 md:px-10 md:py-32 lg:px-12">
        <div class="hero-panel w-full max-w-xl rounded-2xl border border-white/25 bg-[#001a2e]/78 p-6 text-center shadow-[0_12px_48px_rgba(0,0,0,0.35)] sm:p-8 md:max-w-3xl md:p-10">
          <div class="flex flex-col items-center">
            <img
              src="assets/213.png"
              alt="Ateneo de Davao University"
              width="160"
              height="160"
              class="mx-auto h-24 w-24 object-contain drop-shadow-[0_4px_16px_rgba(0,0,0,0.35)] sm:h-28 sm:w-28 md:h-32 md:w-32"
              decoding="async"
            />
            <p class="font-display mt-5 text-xs font-semibold uppercase tracking-[0.36em] text-white text-hero-shadow-sm md:mt-6 md:text-[13px]">
              Ateneo de Davao University
            </p>
            <h1 id="hero-heading" class="font-display mt-4 text-hero-shadow md:mt-5">
              <span class="block text-[2rem] font-extrabold uppercase leading-[1.12] tracking-[0.05em] text-white sm:text-5xl md:text-6xl md:tracking-[0.06em] lg:text-7xl">Fitness &amp; Wellness</span>
              <span class="mt-2 block text-[1.65rem] font-bold uppercase tracking-[0.12em] text-white sm:text-4xl md:mt-3 md:text-5xl lg:text-6xl">Center</span>
            </h1>
            <div class="mt-8 flex w-full flex-wrap justify-center md:mt-10">
              <a href="about.html" class="font-display inline-flex min-h-[48px] min-w-[160px] items-center justify-center bg-white px-10 py-3.5 text-xs font-bold uppercase tracking-[0.22em] text-[#003A6C] shadow-lg shadow-black/25 transition hover:bg-white">About</a>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var burger = document.getElementById('nav-burger');
      var overlay = document.getElementById('mobile-nav-overlay');
      if (!burger || !overlay) return;
      var closers = overlay.querySelectorAll('[data-close-menu]');

      function openMenu() {
        overlay.classList.remove('hidden');
        overlay.setAttribute('aria-hidden', 'false');
        burger.setAttribute('aria-expanded', 'true');
        burger.setAttribute('aria-label', 'Close menu');
        document.body.style.overflow = 'hidden';
      }
      function closeMenu() {
        overlay.classList.add('hidden');
        overlay.setAttribute('aria-hidden', 'true');
        burger.setAttribute('aria-expanded', 'false');
        burger.setAttribute('aria-label', 'Open menu');
        document.body.style.overflow = '';
      }
      function toggle() {
        if (overlay.classList.contains('hidden')) openMenu();
        else closeMenu();
      }

      burger.addEventListener('click', toggle);
      closers.forEach(function (el) {
        el.addEventListener('click', closeMenu);
      });
      overlay.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', closeMenu);
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !overlay.classList.contains('hidden')) closeMenu();
      });
    })();
  </script>
</body>
</html>
